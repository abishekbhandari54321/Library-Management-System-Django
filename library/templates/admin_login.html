{% extends 'basic.html' %}
{% load static %}

{% block title %} Admin Login {% endblock %}

{% block body %}

<div class="d-flex justify-content-center align-items-center" style="min-height:80vh;">

    <div class="card-custom col-md-5">

        <!-- TITLE -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">🔐 Admin Login</h2>
            <p class="text-muted mb-0">Access the administration panel</p>
        </div>

        <!-- FORM -->
        <form method="POST" onsubmit="return validateAdminLogin()">
            {% csrf_token %}

            <!-- USERNAME -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" id="username" class="form-control" name="username"
                       placeholder="Enter admin username" required>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="password" class="form-control" name="password"
                       placeholder="Enter password" required>
            </div>

            <!-- LOGIN BUTTON -->
            <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>

            <!-- EXTRA LINKS -->
            <div class="text-center mt-3">
                <small class="text-muted">
                    Not an admin? <a href="/student_login/" class="text-decoration-none">Student Login</a>
                </small>
            </div>

        </form>

    </div>

</div>

{% endblock %}

{% block js %}
<script>

/* CLIENT SIDE VALIDATION */
function validateAdminLogin() {
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value;

    if (username === "") {
        alert("Username cannot be empty");
        return false;
    }

    if (password.length < 3) {
        alert("Password must be at least 3 characters");
        return false;
    }

    return true;
}

/* SERVER SIDE LOGIN ERROR HANDLING */
{% if alert %}
    alert("Invalid Username or Password!");
    window.location.href = "/admin_login/";
{% endif %}

</script>
{% endblock %}
