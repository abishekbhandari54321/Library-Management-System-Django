<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<title>{% block title %}{% endblock %}</title>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f7fa;
    padding-top: 70px;
}

/* NAVBAR */
.navbar {
    background: #0f172a;
}
.navbar a {
    color: #fff !important;
    font-weight: 500;
}

/* HERO */
.hero {
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
    padding: 80px 20px;
    border-radius: 12px;
}

/* CARD */
.card-custom {
    border-radius: 12px;
    padding: 25px;
    background: white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn-primary {
    background: #2563eb;
    border: none;
}
.btn-primary:hover {
    background: #1e40af;
}

</style>

{% block css %}{% endblock %}

</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top">
<div class="container-fluid">
<a class="navbar-brand fw-bold">📚 Library System</a>

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="/">Home</a></li>
<li class="nav-item"><a class="nav-link" href="/admin_login/">Admin</a></li>
<li class="nav-item"><a class="nav-link" href="/student_login/">Student</a></li>
<li class="nav-item"><a class="nav-link" href="/student_registration/">Signup</a></li>
</ul>
</div>
</nav>

<div class="container mt-4">
{% block body %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% block js %}{% endblock %}

</body>
</html>
