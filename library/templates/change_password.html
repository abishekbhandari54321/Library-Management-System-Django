{% extends 'student_navbar.html' %}
{% load static %}

{% block title %} Change Password {% endblock %}

{% block body %}

<div class="d-flex justify-content-center align-items-center" style="min-height:80vh;">

    <div class="card-custom col-md-5">

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">🔒 Change Password</h2>
            <p class="text-muted mb-0">Update your account password securely</p>
        </div>

        <!-- FORM -->
        <form method="POST" name="change_password" onsubmit="return checkPassword()">
            {% csrf_token %}

            <!-- USERNAME -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" class="form-control" value="{{request.user}}" readonly>
            </div>

            <!-- CURRENT PASSWORD -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Current Password</label>
                <input type="password" id="current_password" class="form-control" name="current_password" placeholder="Enter current password" required>
            </div>

            <!-- NEW PASSWORD -->
            <div class="mb-3">
                <label class="form-label fw-semibold">New Password</label>
                <input type="password" id="new_password" class="form-control" name="new_password" placeholder="Enter new password" required>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input type="password" id="confirm_password" class="form-control" name="confirm_password" placeholder="Confirm new password" required>
            </div>

            <!-- SHOW PASSWORD -->
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" onclick="togglePassword()">
                <label class="form-check-label">Show Passwords</label>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-primary w-100">Update Password</button>

        </form>

    </div>

</div>

{% endblock %}

{% block js %}
<script>

// PASSWORD MATCH CHECK
function checkPassword() {
    let newPass = document.getElementById("new_password").value;
    let confirmPass = document.getElementById("confirm_password").value;

    if (newPass !== confirmPass) {
        alert("New Password and Confirm Password do not match.");
        return false;
    }

    if (newPass.length < 4) {
        alert("Password must be at least 4 characters.");
        return false;
    }

    return true;
}

// SHOW/HIDE PASSWORD
function togglePassword() {
    let fields = ["current_password", "new_password", "confirm_password"];

    fields.forEach(id => {
        let field = document.getElementById(id);
        field.type = field.type === "password" ? "text" : "password";
    });
}

{% if alert %}
alert("Password Updated Successfully.");
document.location = "/logout";
{% endif %}

{% if currpasswrong %}
alert("Current Password is incorrect.");
document.location = "/change_password";
{% endif %}

</script>
{% endblock %}
