{% extends 'basic.html' %}
{% load static %}

{% block title %} Student Login {% endblock %}

{% block body %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-lg p-4 border-0">

                <h3 class="text-center fw-bold">Student Login</h3>
                <p class="text-center text-muted">Access your library account</p>

                <form method="POST" onsubmit="return validateForm()">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Enter username">
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Enter password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block js %}
<script>

// EMPTY FIELD VALIDATION (JS ALERT)
function validateForm() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user.trim() === "" || pass.trim() === "") {
        alert("Please enter Username and Password");
        return false;
    }
    return true;
}

// INVALID LOGIN ALERT FROM BACKEND
{% if login_error %}
alert("Invalid Username or Password");
window.location.href = "/student_login/";
{% endif %}

</script>
{% endblock %}
