{% extends 'admin_navbar.html' %}
{% load static %}

{% block title %} Add Book {% endblock %}

{% block body %}

<div class="d-flex justify-content-center align-items-center" style="min-height:80vh;">

    <div class="card-custom col-md-5">

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">📚 Add Book</h2>
            <p class="text-muted mb-0">Fill the details to add a new book</p>
        </div>

        <!-- FORM -->
        <form method="POST" onsubmit="return validateBookForm()">
            {% csrf_token %}

            <!-- BOOK NAME -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Book Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Enter book name" required>
            </div>

            <!-- AUTHOR -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Author Name</label>
                <input type="text" id="author" name="author" class="form-control" placeholder="Enter author name" required>
            </div>

            <!-- ISBN -->
            <div class="mb-3">
                <label class="form-label fw-semibold">ISBN Number</label>
                <input type="number" id="isbn" name="isbn" class="form-control" placeholder="Enter ISBN number" required>
            </div>

            <!-- CATEGORY -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Category</label>
                <input type="text" id="category" name="category" class="form-control" placeholder="Enter category" required>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-primary w-100">Add Book</button>

        </form>

    </div>

</div>

{% endblock %}

{% block js %}
<script>
function validateBookForm() {
    let name = document.getElementById("name").value.trim();
    let author = document.getElementById("author").value.trim();
    let isbn = document.getElementById("isbn").value;
    let category = document.getElementById("category").value.trim();

    if (name === "") {
        alert("Book name is required");
        return false;
    }

    if (author === "") {
        alert("Author name is required");
        return false;
    }

    if (isbn.length < 5) {
        alert("Enter valid ISBN number");
        return false;
    }

    if (category === "") {
        alert("Category is required");
        return false;
    }

    return true;
}

{% if alert %}
alert("Book added successfully!");
document.location = "/view_books";
{% endif %}
</script>
{% endblock %}
