{% extends 'student_navbar.html' %}

{% block title %} Edit Profile {% endblock %}

{% block body %}

<div class="d-flex justify-content-center align-items-center" style="min-height:80vh;">

    <div class="card-custom col-md-6">

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">👤 Edit Profile</h2>
            <p class="text-muted mb-0">Update your personal details</p>
        </div>

        <!-- FORM -->
        <form method="POST">
            {% csrf_token %}

            <!-- EMAIL + PHONE -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" class="form-control" name="email" value="{{user.email}}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Mobile Number</label>
                    <input type="number" class="form-control" name="phone" value="{{user.student.phone}}" required>
                </div>
            </div>

            <!-- BRANCH + CLASS -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Branch</label>
                    <input type="text" class="form-control" name="branch" value="{{user.student.branch}}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Class</label>
                    <input type="text" class="form-control" name="classroom" value="{{user.student.classroom}}" required>
                </div>
            </div>

            <!-- ROLL NO -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Roll Number</label>
                <input type="text" class="form-control" name="roll_no" value="{{user.student.roll_no}}" required>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-primary w-100">
                Update Profile
            </button>

        </form>

    </div>

</div>

{% endblock %}

{% block js %}
<script>
{% if alert %}
alert("Profile Updated Successfully.");
document.location = "/profile";
{% endif %}
</script>
{% endblock %}
