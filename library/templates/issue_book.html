{% extends 'admin_navbar.html' %}
{% load static %}

{% block title %} Issue Book {% endblock %}

{% block body %}

<div class="d-flex justify-content-center align-items-center" style="min-height:80vh;">

    <div class="card-custom col-md-5">

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">📚 Issue Book</h2>
            <p class="text-muted mb-0">Assign a book to a student</p>
        </div>

        <!-- FORM -->
        <form method="POST">
            {% csrf_token %}

            {% for i in form %}
            <div class="mb-3">
                <label class="form-label fw-semibold">{{ i.label }}</label>
                {{ i }}
            </div>
            {% endfor %}

            <!-- BUTTON -->
            <button type="submit" class="btn btn-primary w-100 mt-2">
                Issue Book
            </button>

        </form>

    </div>

</div>

{% endblock %}

{% block js %}
<script>
{% if alert %}
alert("Book Successfully Issued.");
document.location = "/issue_book";
{% endif %}
</script>
{% endblock %}
